query GetAccount {
  activeUser {
    id
    name
    email
    role
    verified
    hasPendingVerification
    isOnboardingFinished
    permissions {
      canAccessServerAdminPanel {
        authorized
        code
        message
      }
      canCreatePersonalProject {
        authorized
        code
        message
      }
      canCreateWorkspace {
        authorized
        code
        message
      }
      canManageServerRegions {
        authorized
        code
        message
      }
      canManageServerUsers {
        authorized
        code
        message
      }
      canManageServerWorkspaces {
        authorized
        code
        message
      }
      canSupportServerUsers {
        authorized
        code
        message
      }
      canUpdateServerSettings {
        authorized
        code
        message
      }
      canUsePowerTools {
        authorized
        code
        message
      }
    }
  }
}
